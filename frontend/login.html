<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GusTech OS - Login</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">

    <div class="login-card">

        <svg class="logo-mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#3B82F6"/>
                    <stop offset="100%" stop-color="#22D3EE"/>
                </linearGradient>
            </defs>
            <polygon points="50,4 90,26 90,74 50,96 10,74 10,26" fill="url(#bg)"/>
            <text x="50" y="66" font-family="Space Grotesk, Arial, sans-serif" font-weight="700" font-size="46" fill="#0B1120" text-anchor="middle">G</text>
        </svg>

        <h1>GUSTECH OS</h1>

        <p>Gerador Inteligente de OS</p>

        <input
            type="text"
            id="usuario"
            placeholder="Usuário">

        <input
            type="password"
            id="senha"
            placeholder="Senha">

        <button onclick="login()">

            Entrar

        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
