<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GusTech OS - Criar Conta</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">

    <div class="login-card">

        <svg class="logo-mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#3B82F6"/>
                    <stop offset="100%" stop-color="#22D3EE"/>
                </linearGradient>
            </defs>
            <polygon points="50,4 90,26 90,74 50,96 10,74 10,26" fill="url(#bg)"/>
            <text x="50" y="66" font-family="Space Grotesk, Arial, sans-serif" font-weight="700" font-size="46" fill="#0B1120" text-anchor="middle">G</text>
        </svg>

        <h1>CRIAR CONTA</h1>

        <p>GusTech OS</p>

        <input
            type="text"
            id="novoUsuario"
            placeholder="Escolha um usuário">

        <input
            type="password"
            id="novaSenha"
            placeholder="Escolha uma senha (mín. 6 caracteres)">

        <button id="botaoRegistrar">

            Criar Conta

        </button>

        <p id="mensagem" style="margin-top:16px; font-size:13px; text-transform:none; letter-spacing:normal;"></p>

        <p style="margin-top:24px; font-size:13px; text-transform:none; letter-spacing:normal;">
            Já tem conta? <a href="login.html" style="color:#22D3EE;">Fazer login</a>
        </p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
