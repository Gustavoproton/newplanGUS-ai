<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewPlan AI</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>NEWPLAN AI</h1>

    <h2>Gerador Inteligente de Ordem de Serviço</h2>

    <label>Escopo da Ordem de Serviço</label>

    <textarea
        id="escopo"

        GERAR ORDEM DE SERVIÇO

    </button>

    <label>Resultado</label>

    <textarea
        id="resultado"
        readonly></textarea>

    <button id="copiar">

        COPIAR

    </button>

</div>

<script src="script.js"></script>

</body>
</html>
